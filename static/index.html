<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>eventrelay</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace; background: #0d1117; color: #c9d1d9; }
  header { padding: 12px 20px; background: #161b22; border-bottom: 1px solid #30363d; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  header h1 { font-size: 16px; color: #58a6ff; font-weight: 600; white-space: nowrap; }
  .badge { padding: 2px 8px; border-radius: 10px; font-size: 12px; font-weight: 600; }
  .badge-green { background: #238636; color: #fff; }
  .badge-red { background: #f85149; color: #fff; }
  .badge-yellow { background: #d29922; color: #000; }
  .stats-bar { display: flex; gap: 16px; padding: 8px 20px; background: #0d1117; border-bottom: 1px solid #30363d; font-size: 12px; color: #8b949e; align-items: center; }
  .stat { display: flex; align-items: center; gap: 4px; }
  .stat-value { color: #c9d1d9; font-weight: 600; }
  .sparkline-wrap { display: flex; align-items: center; gap: 4px; }
  .sparkline-wrap svg { display: block; }
  .sources { display: flex; gap: 6px; margin-left: auto; }
  .source-tag { background: #161b22; border: 1px solid #30363d; padding: 1px 6px; border-radius: 3px; font-size: 11px; cursor: pointer; }
  .source-tag:hover { border-color: #58a6ff; }
  .channel-bar { display: flex; gap: 0; padding: 0 20px; background: #161b22; border-bottom: 1px solid #30363d; }
  .channel-tab { padding: 6px 14px; font-size: 12px; color: #8b949e; cursor: pointer; border-bottom: 2px solid transparent; }
  .channel-tab:hover { color: #c9d1d9; }
  .channel-tab.active { color: #58a6ff; border-bottom-color: #58a6ff; }
  .filters { display: flex; gap: 8px; flex: 1; }
  .filters input { background: #0d1117; border: 1px solid #30363d; color: #c9d1d9; padding: 4px 8px; border-radius: 4px; font-size: 13px; width: 100px; }
  .controls { display: flex; gap: 8px; }
  .controls button { background: #21262d; border: 1px solid #30363d; color: #c9d1d9; padding: 4px 12px; border-radius: 4px; cursor: pointer; font-size: 13px; }
  .controls button:hover { background: #30363d; }
  .controls button.active { background: #388bfd30; border-color: #58a6ff; color: #58a6ff; }
  #feed { padding: 8px; overflow-y: auto; height: calc(100vh - 130px); }
  .event { margin: 2px 8px; padding: 6px 12px; background: #161b22; border-left: 3px solid #30363d; border-radius: 0 6px 6px 0; font-size: 13px; cursor: pointer; }
  .event:hover { background: #1c2333; }
  .event.level-error { border-left-color: #f85149; }
  .event.level-warn { border-left-color: #d29922; }
  .event.level-info { border-left-color: #58a6ff; }
  .event.level-debug { border-left-color: #8b949e; }
  .event .row { display: flex; align-items: baseline; gap: 8px; }
  .event .fields { display: flex; gap: 8px; align-items: baseline; flex-shrink: 0; }
  .event .source { color: #58a6ff; font-weight: 600; }
  .event .channel { color: #bc8cff; }
  .event .action { color: #d2a8ff; }
  .event .agent { color: #7ee787; font-size: 12px; }
  .event .level { font-size: 11px; padding: 1px 5px; border-radius: 3px; text-transform: uppercase; }
  .level-error .level { background: #f8514920; color: #f85149; }
  .level-warn .level { background: #d2992220; color: #d29922; }
  .level-info .level { background: #58a6ff20; color: #58a6ff; }
  .level-debug .level { background: #8b949e20; color: #8b949e; }
  .event .duration { color: #d2a8ff; font-size: 12px; }
  .event .inline-data { color: #6e7681; font-size: 12px; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .event .time { color: #8b949e; font-size: 12px; white-space: nowrap; flex-shrink: 0; }
  .event .detail { display: none; margin-top: 6px; padding-top: 6px; border-top: 1px solid #30363d; white-space: pre-wrap; font-size: 12px; color: #8b949e; }
  .event.expanded .detail { display: block; }
  .event.expanded .inline-data { display: none; }
  .empty { text-align: center; padding: 60px 20px; color: #8b949e; }
  .empty code { background: #161b22; padding: 2px 6px; border-radius: 4px; }
</style>
</head>
<body>
<header>
  <h1>eventrelay</h1>
  <span class="badge badge-green" id="count">0</span>
  <div class="filters">
    <input id="f-source" placeholder="source" list="dl-source" type="text">
    <input id="f-channel" placeholder="channel" list="dl-channel" type="text">
    <input id="f-action" placeholder="action" list="dl-action" type="text">
    <input id="f-level" placeholder="level" list="dl-level" type="text">
    <input id="f-agent" placeholder="agent_id" list="dl-agent" type="text">
  </div>
  <div class="controls">
    <button id="btn-pause">Pause</button>
    <button id="btn-clear">Clear</button>
  </div>
</header>
<div class="stats-bar" id="stats-bar">
  <div class="sparkline-wrap"><span class="stat-label">rate:</span> <span class="stat-value" id="s-rate">0/s</span> <svg id="sparkline" width="120" height="20"></svg></div>
  <div class="stat"><span class="stat-label">total:</span> <span class="stat-value" id="s-total">0</span></div>
  <div class="stat"><span class="stat-label">clients:</span> <span class="stat-value" id="s-clients">0</span></div>
  <div class="stat" id="s-errors-wrap" style="display:none"><span class="badge badge-red" id="s-errors">0 errors</span></div>
  <div class="stat" id="s-warns-wrap" style="display:none"><span class="badge badge-yellow" id="s-warns">0 warns</span></div>
  <div class="sources" id="s-sources"></div>
</div>
<div class="channel-bar" id="channel-bar">
  <div class="channel-tab active" data-channel="">all</div>
</div>
<div id="feed">
  <div class="empty" id="empty-msg">
    Waiting for events...<br><br>
    POST JSON to <code>/events</code>
  </div>
</div>
<script src="app.js"></script>
</body>
</html>
