<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>eventrelay</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace; background: #0d1117; color: #c9d1d9; }
  header { padding: 12px 20px; background: #161b22; border-bottom: 1px solid #30363d; display: flex; align-items: center; gap: 16px; }
  header h1 { font-size: 16px; color: #58a6ff; font-weight: 600; }
  .badge { background: #238636; color: #fff; padding: 2px 8px; border-radius: 10px; font-size: 12px; }
  .filters { display: flex; gap: 8px; flex: 1; }
  .filters input { background: #0d1117; border: 1px solid #30363d; color: #c9d1d9; padding: 4px 8px; border-radius: 4px; font-size: 13px; width: 120px; }
  .controls { display: flex; gap: 8px; }
  .controls button { background: #21262d; border: 1px solid #30363d; color: #c9d1d9; padding: 4px 12px; border-radius: 4px; cursor: pointer; font-size: 13px; }
  .controls button:hover { background: #30363d; }
  .controls button.active { background: #388bfd30; border-color: #58a6ff; color: #58a6ff; }
  #feed { padding: 8px; overflow-y: auto; height: calc(100vh - 52px); }
  .event { margin: 4px 8px; padding: 8px 12px; background: #161b22; border: 1px solid #30363d; border-radius: 6px; font-size: 13px; cursor: pointer; }
  .event:hover { border-color: #58a6ff; }
  .event .meta { display: flex; gap: 12px; align-items: center; }
  .event .source { color: #58a6ff; font-weight: 600; }
  .event .action { color: #d2a8ff; }
  .event .agent { color: #7ee787; }
  .event .time { color: #8b949e; margin-left: auto; font-size: 12px; }
  .event .detail { display: none; margin-top: 8px; padding-top: 8px; border-top: 1px solid #30363d; white-space: pre-wrap; font-size: 12px; color: #8b949e; }
  .event.expanded .detail { display: block; }
  .empty { text-align: center; padding: 60px 20px; color: #8b949e; }
  .empty code { background: #161b22; padding: 2px 6px; border-radius: 4px; }
</style>
</head>
<body>
<header>
  <h1>eventrelay</h1>
  <span class="badge" id="count">0</span>
  <div class="filters">
    <input id="f-source" placeholder="source" type="text">
    <input id="f-action" placeholder="action" type="text">
    <input id="f-agent" placeholder="agent_id" type="text">
  </div>
  <div class="controls">
    <button id="btn-pause">Pause</button>
    <button id="btn-clear">Clear</button>
  </div>
</header>
<div id="feed">
  <div class="empty" id="empty-msg">
    Waiting for events...<br><br>
    POST JSON to <code>http://localhost:<span class="port">6060</span>/events</code>
  </div>
</div>
<script src="app.js"></script>
</body>
</html>
