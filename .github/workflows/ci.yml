name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.26']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Build
        run: go build ./...

      - name: Test
        run: go test -race ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: latest

      - name: Check go fix
        run: |
          go fix ./...
          if [ -n "$(git diff)" ]; then
            echo "go fix produced changes -- run 'go fix ./...' locally"
            git diff
            exit 1
          fi

  sdk-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Python SDK tests (stdlib unittest)
        run: PYTHONPATH=sdks/python python -m unittest discover -s sdks/python/tests -p "test_*.py"

  sdk-typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install TypeScript SDK dependencies
        run: npm --prefix sdks/typescript install
      - name: TypeScript SDK compile check
        run: npm --prefix sdks/typescript test
